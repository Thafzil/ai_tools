services:
  - type: web
    name: ai-tools-api
    runtime: node
    buildCommand: npm ci && npm run build:render:api
    startCommand: npm run api:start
    healthCheckPath: /api/neatcode/health
    envVars:
      - key: ALLOW_MEMORY_FALLBACK
        value: false
      - key: CORS_ORIGIN
        value: https://ai-tools-awpa.onrender.com
      - key: HOST
        value: 0.0.0.0
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4.1-mini
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_TIMEOUT_MS
        value: 90000
      - key: MONGO_DB_NAME
        value: neatcode
      - key: MONGO_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: decoders-workspace-ui
    runtime: static
    buildCommand: npm ci && npm run build:render:ui
    staticPublishPath: ./dist/decoders-markdown/browser
    headers:
      - path: /federation.manifest.json
        name: Cache-Control
        value: no-cache
      - path: /remotes/*/remoteEntry.json
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ai-tools-api-6jkb.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
